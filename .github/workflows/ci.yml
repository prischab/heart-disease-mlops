# .github/workflows/ci.yml
#
# This is the CI/CD pipeline. GitHub runs it automatically on every push
# and pull request. If anything fails, the commit gets a red X; if everything
# passes, it gets a green checkmark.
#
# What it does:
#   1. Spins up a fresh Ubuntu machine
#   2. Installs Python + your dependencies
#   3. Trains the model (so the tests have a model to load)
#   4. Runs your pytest suite
#   5. Builds the Docker image (proves the container still builds)

name: CI

# When to run: on every push and pull request to the main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      # Get your code onto the runner
      - name: Check out code
        uses: actions/checkout@v4

      # Install Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install dependencies + test tools
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      # Train the model so tests have model/model.pkl to load
      - name: Train model
        run: python train.py

      # Run the test suite
      - name: Run tests
        run: python -m pytest -v

      # Build the Docker image to confirm the container still builds
      - name: Build Docker image
        run: docker build -t heart-api .